<!DOCTYPE html>
<html lang="en">
<head>
   <meta charset="UTF-8">
   <meta http-equiv="X-UA-Compatible" content="IE=edge">
   <meta name="viewport" content="width=device-width, initial-scale=1.0">
   <title>library</title>
   <link rel="stylesheet" href="style.css">
   <script src="script.js" defer></script>
</head>
<body>
   <header>
      <h1>library</h1>
      <div class="upload-button">+</div>
      <button>Log in</button>
   </header>
   <form action="#" class="book-form">
      <h2>Book</h2>
      <label for="title">Title</label><br>
      <input type="text" name="title" id="title" placeholder="Title" required><br>
      <label for="author">Author</label><br>
      <input type="text" name="author" id="author" placeholder="Author" required><br>
      <label for="pages">Pages</label><br>
      <input type="number" name="pages" id="pages" placeholder="Pages" required><br>
      <input type="checkbox" name="isRead" id="isRead">
      <label for="isRead">I am done reading this book.</label><br>
      
      <button type="submit">Submit</button>
   </form>
   
   
   <div class="container"></div> 
</body>
</html>
